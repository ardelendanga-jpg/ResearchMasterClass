.reveal-btn:hover{background:#e2e8f0}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0.75rem 0}
.card-sm{background:#f8fafc;border:0.5px solid #e2e8f0;border-radius:6px;padding:0.75rem 1rem}

.quiz-feedback.bad{background:#FCEBEB;color:#791F1F}

.table-simple th{background:var(--nc-navy);color:#fff;padding:7px 10px;text-align:left;font-weight:500}
.table-simple td{padding:7px 10px;border-bottom:0.5px solid #e2e8f0;color:#2d3748}

{id:'t4_intro', render(){return `
<div class="slide-header">
  <div class="eyebrow"><span class="topic-badge">Topic 4</span> Introduction</div>
  <h2>What is Routine Data?</h2>
</div>
<div class="slide-body">
  <div class="def-box">
    <div class="def-label">Definition</div>
    <p>Data derived from ongoing, systematic collection engines within health, vital, and social registries that were <strong>not originally designed</strong> to address a specific primary research hypothesis.</p>
  </div>
  <p class="ppt"><strong>Why do clinical researchers rely on it?</strong></p>
  <ul class="bullets">
    <li><strong>Scale:</strong> Captures unselected populations, avoiding clinical trial selection bias.</li>
    <li><strong>Efficiency:</strong> Readily accessible and highly cost-effective since the data already exists.</li>
    <li><strong>Speed & Continuity:</strong> Enables rapid hypothesis testing and monitors long-term trends over decades.</li>
  </ul>
</div>
`}},

{id:'t4_sources', render(){return `
<div class="slide-header">
  <div class="eyebrow"><span class="topic-badge">Topic 4</span> Data Components</div>
  <h2>Denominators vs. Numerators</h2>
</div>
<div class="slide-body">
  <p class="ppt">Epidemiological metrics require two fundamental building blocks:</p>
  <div class="grid2">
    <div class="card-sm" style="border-top:3px solid var(--nc-navy)">
      <div class="card-title">Denominator (The Base)</div>
      <p>Information detailing the underlying population at risk.</p>
      <ul class="bullets" style="margin-top:0.5rem; font-size:12px;">
        <li><strong>ZIMSTAT Census:</strong> National baselines and intercensal projections.</li>
        <li><strong>Vital Registration:</strong> Birth and death certificates (adjusting the population).</li>
      </ul>
    </div>
    <div class="card-sm" style="border-top:3px solid var(--nc-red)">
      <div class="card-title">Numerator (The Cases)</div>
      <p>Information characterising the precise health event.</p>
      <ul class="bullets" style="margin-top:0.5rem; font-size:12px;">
        <li><strong>Hospital Data:</strong> Discharge codings (e.g., Parirenyatwa Hospital).</li>
        <li><strong>Clinic EHRs:</strong> Real-time outpatient logs (e.g., Newlands Clinic).</li>
      </ul>
    </div>
  </div>
</div>
`}},

{id:'t4_registries', render(){return `
<div class="slide-header">

  <div class="def-box" style="margin-top:1rem;">
    <div class="def-label">The Power of Data Linkage</div>
    <p>Connecting distinct databases (e.g., linking the TB Register with the ART Register) allows researchers to measure co-infection outcomes and programmatic gaps without executing expensive primary fieldwork.</p>
  </div>

{id:'t4_calc', render(){return `
<div class="slide-header">
  <div class="eyebrow"><span class="topic-badge">Topic 4</span> Applied Epidemiology</div>
  <h2>Calculating Point Prevalence</h2>
</div>
<div class="slide-body">
  <p class="ppt">Measures of occurrence from routine systems rely on a straightforward foundational formula:</p>
  <div class="def-box" style="text-align:center;">
    <p style="font-weight:600; margin:0.2rem 0;">$$\text{Measure} = \frac{\text{Numerator (Cases)}}{\text{Denominator (Population at Risk)}}$$</p>
  </div>
  <p class="ppt"><strong>Clinical Scenario:</strong> We are evaluating active Tuberculosis burdens within an urban HIV treatment cohort over a 6-month period.</p>
  <ul class="bullets" style="margin-bottom:0.5rem;">
    <li>Active TB cases identified in EHR screening (Numerator) = <strong>45 cases</strong></li>
    <li>Total PLHIV currently registered & active on ART (Denominator) = <strong>2,800 people</strong></li>
  </ul>
  <hr class="divider">
  <button class="reveal-btn" onclick="toggle('calc_reveal')"><i class="ti ti-calculator" aria-hidden="true"></i> Execute Calculation</button>
  <div class="reveal-content" id="calc_reveal">
    <div class="card-sm" style="background:var(--nc-cream); margin-bottom:0.5rem;">
      <p style="font-family:monospace; font-size:14px; font-weight:600; text-align:center;">
        Prevalence = 45 / 2,800 = 0.016
      </p>
    </div>
    <p class="ppt"><strong>Result:</strong> 1.6% of PLHIV in the clinic have active TB, a metric that directly informs clinic screening operations.</p>
  </div>
</div>
`}},

  <h2>Interpreting Routine Parameters</h2>

  <div class="quiz-opts" id="q1opts">
    <button class="quiz-opt" onclick="checkQ(this,'wrong','q1fb')">The true cardiovascular mortality rate for the province.</button>
    <button class="quiz-opt" onclick="checkQ(this,'correct','q1fb')">A proportional mortality indicator, which is highly sensitive to changes in other diseases.</button>
    <button class="quiz-opt" onclick="checkQ(this,'wrong','q1fb')">The cardiovascular case-fatality proportion.</button>
    <button class="quiz-opt" onclick="checkQ(this,'wrong','q1fb')">The cumulative incidence of cardiovascular disease.</button>
  </div>
  <div class="quiz-feedback ok" id="q1fb_correct" style="display:none">
    Correct! Because the denominator is "all recorded mortalities" rather than the total population at risk, this is a proportional measure. If infectious disease deaths drop sharply next year, this cardiovascular proportion will mathematically rise, even if the actual number of heart-related deaths remains flat.

  </div>
</div>
`}},
